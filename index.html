<!DOCTYPE html>
<html>
<head>
<title>Pawfluence Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:'Segoe UI', Arial, sans-serif;
background:#ffffff;
margin:0;
text-align:center;
}

.header{
background:#0d1b2a;
color:white;
padding:22px;
font-size:24px;
}

.container{
display:flex;
justify-content:center;
padding:20px;
}

.card{
background:white;
padding:30px;
width:360px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
text-align:left;
}

h2{
text-align:center;
color:#0d1b2a;
}

p{
text-align:center;
color:#555;
}

input, textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

.pay-btn{
background:#28a745;
color:white;
}

.continue-btn{
background:#0d1b2a;
color:white;
}

.submit-btn{
background:#0d1b2a;
color:white;
}

.hidden{
display:none;
}

.error{
color:red;
font-size:13px;
margin-top:5px;
display:none;
}
</style>

<script>
function showForm(){
let txn = document.getElementById("txn").value.trim();
let error = document.getElementById("error-msg");

// strict check
if(txn === "" || txn.length < 8){
error.style.display = "block";
return;
} else {
error.style.display = "none";
}

// hide payment section
document.getElementById("payment-section").classList.add("hidden");

// show form
document.getElementById("form-section").classList.remove("hidden");

// pass txn into hidden input
document.getElementById("finalTxn").value = txn;
}
</script>

</head>

<body>

<div class="header">
Pawfluence
</div>

<div class="container">
<div class="card">

<!-- PAYMENT -->
<div id="payment-section">

<h2>Complete Your Registration</h2>
<p>Pay ₹149 to continue</p>

<a href="upi://pay?pa=pawfluence01@okhdfcbank&pn=Pawfluence&am=149&cu=INR">
<button class="pay-btn">Pay ₹149</button>
</a>

<input type="text" id="txn" placeholder="Enter UPI Transaction ID after payment">

<div id="error-msg" class="error">
Please enter a valid UPI Transaction ID to continue
</div>

<button class="continue-btn" onclick="showForm()">Continue</button>

</div>

<!-- FORM -->
<div id="form-section" class="hidden">

<h2>Enter Your Details</h2>

<form action="https://formspree.io/f/xkoqpgvy" method="POST">

<input type="hidden" name="transaction_id" id="finalTxn">

<input type="text" name="name" placeholder="Full Name" required>
<input type="tel" name="phone" placeholder="Contact Number" required>
<input type="email" name="email" placeholder="Email" required>

<input type="text" name="instagram" placeholder="Instagram Handle" required>
<input type="text" name="posting" placeholder="Do you post pet content regularly?" required>

<input type="text" name="pet_name" placeholder="Pet Name" required>

<textarea name="intro" placeholder="Tell us about your pet" required></textarea>

<button class="submit-btn">Submit Details</button>

</form>

</div>

</div>
</div>

</body>
</html>
